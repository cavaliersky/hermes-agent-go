name: Build Android ARM (Termux)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabi file

      - name: Build (ARMv7 - Termux Android 32bit)
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build -o build/hermes-agent-armv7

      - name: Check file
        run: |
          file build/hermes-agent-armv7
          ls -lh build/

      # ✅ 方式1：Artifacts（推荐）
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-agent-armv7
          path: build/hermes-agent-armv7

      # ✅ 方式2：Release（自动发布）
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: auto-build
          files: build/hermes-agent-armv7

      # ⚠️ 方式3：Base64（极端情况用）
      - name: Print Base64 (fallback)
        run: |
          echo "==== BASE64 START ===="
          base64 build/hermes-agent-armv7 | head -n 200
          echo "==== BASE64 END ===="
