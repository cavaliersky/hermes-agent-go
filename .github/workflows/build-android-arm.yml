name: Build Hermes (Final Minimal)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go mod tidy

      - name: Build
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -trimpath \
            -o hermes \
            ./cmd/hermes

      - uses: actions/upload-artifact@v4
        with:
          name: hermes-armv7
          path: hermes
